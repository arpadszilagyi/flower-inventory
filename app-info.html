<!doctype html>

<head>
  <meta charset="utf-8">

  <title>Bedienungshandbuch Blumen-Inventar</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root {
      color-scheme: light;
      --text: #22211d;
      --muted: #625f56;
      --line: #d8d1c4;
      --accent: #2f7d62;
      --accent-soft: #edf6f1;
      --paper: #f7f4ee;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 52px;
    }

    header {
      display: flex;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      margin-bottom: 22px;
      padding-bottom: 18px;
    }

    header img {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.15;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 23px;
      line-height: 1.22;
    }

    h3 {
      margin: 18px 0 6px;
      font-size: 18px;
    }

    p,
    li {
      color: var(--muted);
      font-size: 16px;
    }

    p {
      margin: 8px 0;
    }

    ul,
    ol {
      margin: 8px 0 0;
      padding-left: 22px;
    }

    section {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 14px;
      padding: 20px 22px;
    }

    code {
      background: #eee8dc;
      border-radius: 5px;
      color: var(--text);
      padding: 2px 5px;
    }

    .note {
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
    }

    .toc,
    .icon-list {
      display: grid;
      gap: 8px 18px;
      padding-left: 0;
      list-style: none;
    }

    .toc {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .icon-list {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .toc a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .toc a:hover,
    .toc a:focus-visible {
      text-decoration: underline;
    }

    .shortcut {
      font-weight: 700;
      color: var(--text);
    }
  </style>
</head>

      var requestedLanguage = new URLSearchParams(window.location.search).get("lang") || "de";
      var language = manuals[requestedLanguage] ? requestedLanguage : "de";
      var manual = manuals[language];
      var main = document.getElementById("manual");

      document.documentElement.lang = language;
      document.title = manual.title;

      function appendTextElement(parent, tagName, text) {
        var element = document.createElement(tagName);
        element.textContent = text;
        parent.appendChild(element);
        return element;
      }

      function createList(items, ordered, className) {
        var list = document.createElement(ordered ? "ol" : "ul");
        if (className) {
          list.className = className;
        }
        items.forEach(function (item) {
          var row = document.createElement("li");
          if (Array.isArray(item)) {
            var label = document.createElement("span");
            label.className = "shortcut";
            label.textContent = item[0] + ":";
            row.appendChild(label);
            row.appendChild(document.createTextNode(" " + item[1]));
          } else {
            row.textContent = item;
          }
          list.appendChild(row);
        });
        return list;
      }

      function renderSection(sectionData) {
        var section = document.createElement("section");
        section.id = sectionData.id;
        appendTextElement(section, "h2", sectionData.title);
        (sectionData.paragraphs || []).forEach(function (paragraph) {
          appendTextElement(section, "p", paragraph);
        });
        if (sectionData.items) {
          section.appendChild(createList(sectionData.items, false, "icon-list"));
        }
        if (sectionData.bullets) {
          section.appendChild(createList(sectionData.bullets, false));
        }
        if (sectionData.ordered) {
          section.appendChild(createList(sectionData.ordered, true));
        }
        (sectionData.blocks || []).forEach(function (block) {
          appendTextElement(section, "h3", block.subtitle);
          if (block.text) {
            appendTextElement(section, "p", block.text);
          }
          if (block.bullets) {
            section.appendChild(createList(block.bullets, false));
          }
        });
        return section;
      }

      function renderManual() {
        var header = document.createElement("header");
        var image = document.createElement("img");
        var titleWrap = document.createElement("div");
        image.src = "favicon.png";
        image.alt = "";
        appendTextElement(titleWrap, "h1", manual.appName);
        appendTextElement(titleWrap, "p", manual.lead);
        header.appendChild(image);
        header.appendChild(titleWrap);
        main.appendChild(header);

        var note = document.createElement("section");
        note.className = "note";
        appendTextElement(note, "h2", manual.quickTitle);
        manual.quick.forEach(function (paragraph) {
          appendTextElement(note, "p", paragraph);
        });
        main.appendChild(note);

        var contents = document.createElement("section");
        appendTextElement(contents, "h2", manual.contents);
        var toc = document.createElement("ul");
        toc.className = "toc";
        manual.sections.forEach(function (sectionData) {
          var item = document.createElement("li");
          var link = document.createElement("a");
          link.href = "#" + sectionData.id;
          link.textContent = sectionData.title;
          item.appendChild(link);
          toc.appendChild(item);
        });
        contents.appendChild(toc);
        main.appendChild(contents);

        manual.sections.forEach(function (sectionData) {
          main.appendChild(renderSection(sectionData));
        });

        var browsers = document.createElement("section");
        appendTextElement(browsers, "h2", manual.browserTitle);
        browsers.appendChild(createList(manual.browsers, false));
        main.appendChild(browsers);
      }

      renderManual();
    }());
